apiVersion: v1
kind: List
items:
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: rosetta-api
    labels:
      app: rosetta-api
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: rosetta-api
    strategy:
      type: Recreate
    template:
      metadata:
        labels:
          app: rosetta-api
      spec:
        containers:
        - name: api
          image: image-registry.apps.2.rahti.csc.fi/qrosetta/rosetta-api:latest
          imagePullPolicy: Always
          ports:
          - containerPort: 8000
          env:
          - name: OMP_NUM_THREADS
            value: "1"
          - name: MKL_NUM_THREADS
            value: "1"
          - name: OPENBLAS_NUM_THREADS
            value: "1"
          - name: NUMEXPR_NUM_THREADS
            value: "1"
          - name: RUNNER_TIMEOUT_SEC
            value: "60"
          - name: FRONTEND_URL
            value: "https://your-frontend-project.web.app,https://your-frontend-project.firebaseapp.com" # Placeholder for future Frontend Cloud Run/Storage domain
          - name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: rosetta-secrets
                key: DATABASE_URL
          - name: STORAGE_MODE
            value: "s3"
          - name: S3_ENDPOINT_URL
            value: "https://a3s.fi"
          - name: S3_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: rosetta-secrets
                key: S3_ACCESS_KEY
          - name: S3_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: rosetta-secrets
                key: S3_SECRET_KEY
          - name: S3_BUCKET_NAME
            valueFrom:
              secretKeyRef:
                name: rosetta-secrets
                key: S3_BUCKET_NAME
          - name: S3_REGION
            value: "us-east-1"
          resources:
            limits:
              cpu: "0.5"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "256Mi"

- apiVersion: v1
  kind: Service
  metadata:
    name: rosetta-api
  spec:
    type: ClusterIP
    selector:
      app: rosetta-api
    ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP

- apiVersion: route.openshift.io/v1
  kind: Route
  metadata:
    name: rosetta-api-route
  spec:
    to:
      kind: Service
      name: rosetta-api
    port:
      targetPort: 8000
    tls:
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
