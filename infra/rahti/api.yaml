apiVersion: v1
kind: List
items:
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: rosetta-api
    labels:
      app: rosetta-api
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: rosetta-api
    template:
      metadata:
        labels:
          app: rosetta-api
      spec:
        containers:
        - name: api
          image: image-registry.apps.2.rahti.csc.fi/qrosetta/rosetta-api:latest
          imagePullPolicy: Always
          env:
          - name: OMP_NUM_THREADS
            value: "1"
          - name: MKL_NUM_THREADS
            value: "1"
          - name: OPENBLAS_NUM_THREADS
            value: "1"
          - name: NUMEXPR_NUM_THREADS
            value: "1"
          ports:
          - containerPort: 8000
          env:
          - name: RUNNER_TIMEOUT_SEC
            value: "60"
          - name: FRONTEND_URL
            value: "https://your-frontend-project.web.app,https://your-frontend-project.firebaseapp.com" # Placeholder for future Frontend Cloud Run/Storage domain
          resources:
            limits:
              cpu: "0.5"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "256Mi"

- apiVersion: v1
  kind: Service
  metadata:
    name: rosetta-api
  spec:
    type: ClusterIP
    selector:
      app: rosetta-api
    ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP

- apiVersion: route.openshift.io/v1
  kind: Route
  metadata:
    name: rosetta-api-route
  spec:
    to:
      kind: Service
      name: rosetta-api
    port:
      targetPort: 8000
    tls:
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
