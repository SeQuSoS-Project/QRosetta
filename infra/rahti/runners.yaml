apiVersion: v1
kind: List
items:
# --- 1. Qiskit Runner ---
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: pytket-qiskit-runner
    labels:
      app: pytket-qiskit-runner
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: pytket-qiskit-runner
    template:
      metadata:
        labels:
          app: pytket-qiskit-runner
      spec:
        containers:
        - name: runner
          image: image-registry.apps.2.rahti.csc.fi/qrosetta/pytket-qiskit-runner:latest
          imagePullPolicy: Always
          env:
          - name: OMP_NUM_THREADS
            value: "1"
          - name: MKL_NUM_THREADS
            value: "1"
          - name: OPENBLAS_NUM_THREADS
            value: "1"
          - name: NUMEXPR_NUM_THREADS
            value: "1"
          ports:
          - containerPort: 8000
          resources:
            limits:
              cpu: "0.25"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
- apiVersion: v1
  kind: Service
  metadata:
    name: pytket-qiskit-runner
  spec:
    type: ClusterIP
    selector:
      app: pytket-qiskit-runner
    ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP

