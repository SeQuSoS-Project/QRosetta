server {
    listen 8080;
    server_name _;
    client_max_body_size 5M;

    root /usr/share/nginx/html;
    index index.html;

    # --- Frontend static assets: served locally from the image ---
    location = / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        try_files /index.html =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    location /js/ {
        try_files $uri =404;
    }

    # --- Everything else is an API call: proxy to the Rahti backend ---
    # The backend host lives here (infra config), not in JS, so the frontend
    # keeps deriving BASE_URL from window.location.origin and all calls stay
    # same-origin from the browser's perspective.
    location / {
        proxy_pass https://rosetta-api-route-qrosetta.2.rahtiapp.fi;
        proxy_http_version 1.1;
        proxy_set_header Host rosetta-api-route-qrosetta.2.rahtiapp.fi;
        proxy_ssl_server_name on;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 330s;
        proxy_send_timeout 330s;
    }
}
