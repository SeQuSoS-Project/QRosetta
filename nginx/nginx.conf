events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream rosetta_api {
        server rosetta-api:8000;
    }

    server {
        listen 80;

        # Serve Static Files (Frontend) directly
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # Proxy API endpoints to the Python container
        location ~ ^/(run|generate|compare|algorithms|download) {
            proxy_pass http://rosetta_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Increase timeouts for heavy quantum jobs (Max 300s + buffer)
            proxy_read_timeout 330s;
            proxy_connect_timeout 330s;
            proxy_send_timeout 330s;
        }
    }
}
