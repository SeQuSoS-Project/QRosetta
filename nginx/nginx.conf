events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Suppress noisy health-check polling from access logs.
    # GET /algorithms is called every few seconds by the frontend keepalive — hide it.
    map $request $loggable {
        "~^GET /algorithms " 0;
        default              1;
    }
    access_log /var/log/nginx/access.log combined if=$loggable;

    server {
        listen 80;

        # Use Docker's internal DNS resolver with a short TTL so nginx re-resolves
        # 'rosetta-api' after container restarts instead of caching the old IP.
        resolver 127.0.0.11 valid=5s ipv6=off;
        set $api_upstream http://rosetta-api:8000;

        # Serve Static Files (Frontend) directly
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # Proxy API endpoints to the Python container
        location ~ ^/(run|runners|generate|compare|algorithms|config|export|download|visualize|auth|history|jobs|benchmarks) {
            proxy_pass $api_upstream;
            # HTTP/1.1 to the upstream, and ask it for uncompressed responses.
            # Under the default 1.0 proxy, the API's gzipped (Content-Encoding: gzip)
            # body arrived mangled and the browser failed to JSON.parse it. Clearing
            # Accept-Encoding makes FastAPI's GZipMiddleware skip compression, so the
            # API returns plain JSON over the proxy.
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Accept-Encoding "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Increase timeouts for heavy quantum jobs (Max 300s + buffer)
            proxy_read_timeout 330s;
            proxy_connect_timeout 330s;
            proxy_send_timeout 330s;
        }
    }
}
