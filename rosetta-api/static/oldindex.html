<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-900">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Rosetta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                },
            }
        }
    </script>
    <style>
        /* Simple spinner */
        .loader {
            border-top-color: #3498db;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Vertical text for table headers */
        .matrix-table th.sim-header {
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            white-space: nowrap;
            padding-bottom: 8px;
        }
    </style>
</head>
<body class="h-full font-sans text-gray-200">
    <div class="flex flex-col h-screen">
        <!-- Header -->
        <header class="bg-gray-800 border-b border-gray-700 shadow-lg">
            <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
                <div class="flex h-16 items-center justify-between">
                    <div class="flex items-center">
                        <svg class="h-8 w-8 text-blue-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M14.25 9.75L16.5 12l-2.25 2.25m-4.5 0L7.5 12l2.25-2.25M6 20.25h12A2.25 2.25 0 0020.25 18V6A2.25 2.25 0 0018 3.75H6A2.25 2.25 0 003.75 6v12A2.25 2.25 0 006 20.25z" />
                        </svg>
                        <span class="ml-3 text-2xl font-bold text-white">Quantum Rosetta</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col md:flex-row min-h-0">
            
            <!-- Input Panel -->
            <div class="w-full md:w-1/2 p-4 sm:p-6 lg:p-8 flex flex-col border-r border-gray-700 overflow-y-auto">
                <h2 class="text-xl font-semibold text-white mb-4">QASM 2.0 Input</h2>
                <textarea id="qasm-input" class="w-full h-64 md:flex-1 p-3 bg-gray-800 border border-gray-600 rounded-lg text-white font-mono text-sm resize-y focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="OPENQASM 2.0;
include &quot;qelib1.inc&quot;;
qreg q[2];
h q[0];
cx q[0],q[1];"></textarea>
                
                <div class="mt-4">
                    <label for="shots" class="block text-sm font-medium text-gray-300">Shots (for Measurement)</label>
                    <input type="number" id="shots" value="1024" class="mt-1 block w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-white shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 sm:text-sm">
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-6">
                    <button onclick="runComparison('statevector')" id="btn-statevector" class="flex items-center justify-center rounded-lg bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-blue-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-900 focus:ring-blue-500 transition-all">
                        Compare Statevectors
                    </button>
                    <button onclick="runComparison('measured')" id="btn-measured" class="flex items-center justify-center rounded-lg bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-900 focus:ring-indigo-500 transition-all">
                        Compare Measurements
                    </button>
                </div>
            </div>

            <!-- Output Panel -->
            <div class="w-full md:w-1/2 p-4 sm:p-6 lg:p-8 flex flex-col">
                <h2 class="text-xl font-semibold text-white mb-4">Comparison Report</h2>
                <div class="flex-1 flex flex-col bg-gray-800 border border-gray-600 rounded-lg min-h-0">
                    <!-- Loader -->
                    <div id="loader" class="absolute inset-0 z-10 flex items-center justify-center bg-gray-800 bg-opacity-75 rounded-lg hidden">
                        <div class="loader h-12 w-12 rounded-full border-4 border-t-4 border-gray-600"></div>
                    </div>
                    
                    <!-- Tab Navigation -->
                    <nav class="flex border-b border-gray-700" id="tab-nav">
                        <!-- Tabs will be dynamically added here -->
                    </nav>

                    <!-- Tab Panels -->
                    <div class="flex-1 overflow-y-auto" id="tab-content">
                        <!-- Welcome Message -->
                        <div id="welcome-message" class="p-4 text-gray-400 block">Click a button to run a comparison...</div>

                        <!-- Summary Panel -->
                        <div id="summary-panel" class="p-4 hidden"></div>
                        
                        <!-- Performance Panel -->
                        <div id="performance-panel" class="p-4 hidden"></div>

                        <!-- Resources Panel -->
                        <div id="resources-panel" class="p-4 hidden"></div>
                        
                        <!-- Divergence Panel -->
                        <div id="divergence-panel" class="p-4 hidden"></div>

                        <!-- Raw JSON Panel -->
                        <div id="raw-json-panel" class="p-4 hidden relative">
                            <!-- NEW: Copy Button -->
                            <button id="copy-btn" onclick="copyRawJson()" class="absolute top-4 right-4 bg-gray-600 hover:bg-gray-500 text-white text-xs font-medium py-1 px-3 rounded-md transition-all">Copy</button>
                            <pre id="json-output" class="h-full w-full p-0 overflow-auto text-sm text-gray-300 whitespace-pre-wrap break-words"></pre>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script>
        // Set default QASM
        document.getElementById('qasm-input').value = 'OPENQASM 2.0;\ninclude "qelib1.inc";\nqreg q[2];\nh q[0];\ncx q[0],q[1];';

        const qasmInput = document.getElementById('qasm-input');
        const shotsInput = document.getElementById('shots');
        const loader = document.getElementById('loader');
        const btnStatevector = document.getElementById('btn-statevector');
        const btnMeasured = document.getElementById('btn-measured');
        
        const tabNav = document.getElementById('tab-nav');
        const tabContent = document.getElementById('tab-content');
        const welcomeMessage = document.getElementById('welcome-message');
        
        // Store panel references by ID
        const panelElements = {
            'summary': document.getElementById('summary-panel'),
            'performance': document.getElementById('performance-panel'),
            'resources': document.getElementById('resources-panel'),
            'divergence': document.getElementById('divergence-panel'),
            'raw': document.getElementById('raw-json-panel')
        };
        
        // Re-bind jsonOutput as it's inside 'raw'
        let jsonOutput = document.getElementById('json-output');

        function showTab(tabName) {
            // Hide all panels
            welcomeMessage.classList.add('hidden');
            welcomeMessage.classList.remove('block');
            
            Object.values(panelElements).forEach(panel => {
                panel.classList.add('hidden');
                panel.classList.remove('block');
            });

            // Deactivate all buttons
            tabNav.querySelectorAll('button').forEach(btn => {
                btn.classList.remove('text-blue-400', 'border-blue-400');
                btn.classList.add('text-gray-400', 'border-transparent');
            });

            // Show selected panel and activate button
            const panel = panelElements[tabName];
            if (panel) {
                panel.classList.remove('hidden');
                panel.classList.add('block');
            }
            
            const tabButton = tabNav.querySelector(`[data-tab="${tabName}"]`);
            if (tabButton) {
                tabButton.classList.add('text-blue-400', 'border-blue-400');
                tabButton.classList.remove('text-gray-400', 'border-transparent');
            }
        }

        function clearReport() {
            welcomeMessage.classList.add('hidden');
            welcomeMessage.classList.remove('block');
            tabNav.innerHTML = '';
            
            Object.values(panelElements).forEach(panel => {
                panel.innerHTML = ''; // Clear content
                panel.classList.add('hidden');
                panel.classList.remove('block');
            });
            
            // Re-add the pre tag and button to the raw-json-panel
            panelElements.raw.innerHTML = `
                <button id="copy-btn" onclick="copyRawJson()" class="absolute top-4 right-4 bg-gray-600 hover:bg-gray-500 text-white text-xs font-medium py-1 px-3 rounded-md transition-all">Copy</button>
                <pre id="json-output" class="h-full w-full p-0 overflow-auto text-sm text-gray-300 whitespace-pre-wrap break-words"></pre>
            `;
            // Re-bind the jsonOutput element
            jsonOutput = document.getElementById('json-output');
        }

        async function runComparison(type) {
            const qasm_string = qasmInput.value;
            if (!qasm_string.trim()) {
                welcomeMessage.textContent = JSON.stringify({ error: "QASM input cannot be empty." }, null, 2);
                welcomeMessage.classList.remove('hidden');
                welcomeMessage.classList.add('block');
                return;
            }

            let endpoint = '';
            let payload = {};

            if (type === 'statevector') {
                endpoint = '/compare';
                payload = { qasm_string };
            } else {
                endpoint = '/compare_measured';
                const n_shots = parseInt(shotsInput.value, 10) || 1024;
                payload = { qasm_string, n_shots };
            }

            loader.classList.remove('hidden');
            loader.classList.add('flex');
            clearReport();
            btnStatevector.disabled = true;
            btnMeasured.disabled = true;

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'An unknown error occurred.');
                }

                // Render the full report
                renderReport(data);

            } catch (error) {
                console.error('Error:', error);
                panelElements.summary.innerHTML = `<div class="text-red-400">${JSON.stringify({ error: error.message }, null, 2)}</div>`;
                renderTabs(['summary']); // Only show summary tab on error
                showTab('summary');
            } finally {
                loader.classList.add('hidden');
                loader.classList.remove('flex');
                btnStatevector.disabled = false;
                btnMeasured.disabled = false;
            }
        }

        function renderTabs(tabList) {
            tabNav.innerHTML = ''; // Clear old tabs
            tabList.forEach(tabName => {
                const button = document.createElement('button');
                button.className = 'px-4 py-2 font-medium text-sm text-gray-400 border-b-2 border-transparent hover:text-gray-200 hover:border-gray-500';
                button.textContent = tabName.charAt(0).toUpperCase() + tabName.slice(1);
                button.dataset.tab = tabName;
                button.onclick = () => showTab(tabName);
                tabNav.appendChild(button);
            });
        }

        function renderReport(data) {
            const tabs = ['summary', 'performance', 'resources', 'divergence', 'raw'];
            renderTabs(tabs);
            
            // 1. Render Summary
            renderSummary(data);

            // 2. Render Performance
            renderRanking(data.performance_report, panelElements.performance, 'execution_time_sec', 's');

            // 3. Render Resources
            renderRanking(data.resource_report, panelElements.resources, 'memory_usage_mb', 'MiB');

            // 4. Render Divergence
            renderDivergence(data.divergence_report, panelElements.divergence);

            // 5. Render Raw JSON
            jsonOutput.textContent = JSON.stringify(data, null, 2);

            // Show the 'summary' tab by default
            showTab('summary');
        }

        // --- UPDATED FUNCTION ---
        function renderSummary(data) {
            const report = data.divergence_report;
            const divergences = report.divergences_found || [];
            let html = '<div class="space-y-4">';
            
            html += `
                <div>
                    <h3 class="font-semibold text-white">Input</h3>
                    <p class="text-sm text-gray-400 mt-1">${report.simulators.length} simulators tested.</p>
                    ${data.n_shots ? `<p class="text-sm text-gray-400 mt-1">${data.n_shots} shots requested.</p>` : ''}
                </div>
            `;
            
            // --- LOGIC FIX: Differentiate success messages ---
            if (divergences.length === 0) {
                let resultMessage = '';
                if (data.n_shots) {
                    resultMessage = 'All simulators produced statistically identical measurement distributions.';
                } else {
                    resultMessage = 'All simulators produced identical statevectors (1.0 Fidelity).';
                }

                html += `
                    <div>
                        <h3 class="font-semibold text-white">Result</h3>
                        <p class="mt-2 flex items-center text-lg text-green-400">
                            <svg class="h-6 w-6 mr-2" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                            ${resultMessage}
                        </p>
                    </div>
                `;
            } else {
                 html += `
                    <div>
                        <h3 class="font-semibold text-white">Result</h3>
                        <p class="mt-2 flex items-center text-lg text-yellow-400">
                            <svg class="h-6 w-6 mr-2" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126z" /></svg>
                            Found ${divergences.length} divergence(s).
                        </p>
                        <ul class="list-disc list-inside mt-2 text-gray-300">
                            ${divergences.map(d => `<li>${d.type} divergence between ${d.simulators.join(' and ')}</li>`).join('')}
                        </ul>
                    </div>
                `;
            }
            html += '</div>';
            panelElements.summary.innerHTML = html;
        }

        function renderRanking(report, panel, key, unit) {
            let html = `<div class="overflow-x-auto"><table class="min-w-full divide-y divide-gray-700">
                            <thead>
                                <tr>
                                    <th scope="col" class="w-16 px-3 py-3.5 text-left text-sm font-semibold text-white bg-gray-800">Rank</th>
                                    <th scope="col" class="px-3 py-3.5 text-left text-sm font-semibold text-white bg-gray-800">Simulator</th>
                                    <th scope="col" class="px-3 py-3.5 text-left text-sm font-semibold text-white bg-gray-800">${report.summary}</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-700">`;
            
            report.ranking.forEach((item, index) => {
                const value = item[key] !== null ? `${item[key].toFixed(4)} ${unit}` : 'N/A';
                html += `
                    <tr class="${index % 2 === 0 ? 'bg-gray-800 bg-opacity-50' : ''}">
                        <td class="whitespace-nowrap px-3 py-4 text-sm text-gray-300 text-center">${index + 1}</td>
                        <td class="whitespace-nowrap px-3 py-4 text-sm text-gray-300">${item.simulator}</td>
                        <td class="whitespace-nowrap px-3 py-4 text-sm text-gray-300">${value}</td>
                    </tr>
                `;
            });

            html += `</tbody></table></div>`;
            panel.innerHTML = html;
        }
        
        function renderDivergence(report, panel) {
            let html = '<div class="space-y-6">';

            if (report.fidelity_matrix) {
                html += renderMatrixTable(report, 'fidelity_matrix', 'Fidelity Matrix');
                html += renderMatrixTable(report, 'relative_phase_matrix', 'Relative Phase Matrix');
            } else if (report['statistical_distance_matrix (js_divergence)']) {
                html += renderMatrixTable(report, 'statistical_distance_matrix (js_divergence)', 'JS-Divergence Matrix');
            }
            
            html += '</div>';
            panel.innerHTML = html;
        }

        function renderMatrixTable(report, matrixKey, title) {
            const matrix = report[matrixKey];
            const simulators = report.simulators;
            let html = `
                <div>
                    <h3 class="text-lg font-semibold text-white mb-2">${title}</h3>
                    <div class="overflow-x-auto">
                        <table class="matrix-table border-collapse border border-gray-700">
                            <thead>
                                <tr>
                                    <th class="border border-gray-600 bg-gray-800 p-2"></th>
                                    ${simulators.map(sim => `<th class="sim-header border border-gray-600 bg-gray-800 p-2 text-sm">${sim}</th>`).join('')}
                                </tr>
                            </thead>
                            <tbody>
            `;
            
            simulators.forEach((sim, i) => {
                html += `<tr><th class="border border-gray-600 bg-gray-800 p-2 text-sm text-left">${sim}</th>`;
                matrix[i].forEach((value, j) => {
                    let formattedValue = value.toFixed(4);
                    if (value === 1.0) formattedValue = "1.0";
                    if (value === 0.0) formattedValue = "0.0";
                    if (value === -1.0) formattedValue = "ERR";
                    
                    let bgClass = 'bg-gray-800';
                    if (value === 1.0) bgClass = 'bg-green-800 bg-opacity-30';
                    if (value > 0.0 && value < 1.0) bgClass = 'bg-yellow-800 bg-opacity-30';
                    if (value === -1.0) bgClass = 'bg-red-800 bg-opacity-30';

                    html += `<td class="border border-gray-700 p-2 text-xs font-mono text-center ${bgClass}">${formattedValue}</td>`;
                });
                html += `</tr>`;
            });

            html += `</tbody></table></div></div>`;
            return html;
        }
        
        // --- NEW FUNCTION ---
        function copyRawJson() {
            const jsonText = jsonOutput.textContent;
            const copyButton = document.getElementById('copy-btn');
            
            // Create a temporary textarea to hold the text
            const textArea = document.createElement('textarea');
            textArea.value = jsonText;
            textArea.style.position = 'fixed'; // Hide it
            textArea.style.top = '0';
            textArea.style.left = '0';
            textArea.style.opacity = '0';
            document.body.appendChild(textArea);
            
            textArea.focus();
            textArea.select();
            
            try {
                // Use document.execCommand as it's more reliable in iFrames
                document.execCommand('copy');
                copyButton.textContent = 'Copied!';
                setTimeout(() => {
                    copyButton.textContent = 'Copy';
                }, 2000);
            } catch (err) {
                console.error('Failed to copy JSON:', err);
                copyButton.textContent = 'Error';
            }
            
            document.body.removeChild(textArea);
        }

    </script>
</body>
</html>
