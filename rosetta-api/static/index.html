<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Rosetta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border-top-color: #3b82f6;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .matrix-table th.sim-header {
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            white-space: nowrap;
            padding-bottom: 8px;
        }
    </style>
</head>
<body class="h-full font-sans text-gray-900">
    <div class="flex flex-col h-screen">
        <header class="bg-white border-b border-gray-200 shadow-sm">
            <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
                <div class="flex h-16 items-center justify-between">
                    <div class="flex items-center">
                        <span class="ml-3 text-2xl font-bold text-gray-900">Quantum Rosetta</span>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-1 flex flex-col md:flex-row min-h-0">
            
            <div class="w-full md:w-1/2 p-4 sm:p-6 lg:p-8 flex flex-col border-r border-gray-200 overflow-y-auto bg-white">
                <div>
                    <h2 class="text-xl font-semibold text-gray-900 mb-4">On-Demand Comparison</h2>
                    <textarea id="qasm-input" class="w-full h-64 md:flex-1 p-3 bg-gray-50 border border-gray-300 rounded-md text-gray-900 font-mono text-sm resize-y focus:outline-none focus:ring-2 focus:ring-blue-500">OPENQASM 2.0;
include "qelib1.inc";
qreg q[2];
h q[0];
cx q[0],q[1];</textarea>
                    <div class="mt-4">
                        <label for="shots" class="block text-sm font-medium text-gray-700">Shots (for Measurement)</label>
                        <input type="number" id="shots" value="1024" class="mt-1 block w-full bg-white border border-gray-300 rounded-md px-3 py-2 text-gray-900 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 sm:text-sm">
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-6">
                        <button onclick="runComparison('statevector')" id="btn-statevector" class="flex items-center justify-center rounded-md bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-blue-500 text-white transition-all">Compare Statevectors</button>
                        <button onclick="runComparison('measured')" id="btn-measured" class="flex items-center justify-center rounded-md bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 text-white transition-all">Compare Measurements</button>
                    </div>
                </div>
                <div class="mt-8 pt-8 border-t border-gray-200">
                    <h2 class="text-xl font-semibold text-gray-900 mb-2">Benchmark Suite</h2>
                    <p class="text-sm text-gray-600 mb-4">Run all pre-loaded <code>.qasm</code> files from the server.</p>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <button onclick="runBenchmark('statevector')" id="btn-bench-statevector" class="flex items-center justify-center rounded-md bg-green-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-green-500 text-white transition-all">Run Statevector Suite</button>
                        <button onclick="runBenchmark('measured')" id="btn-bench-measured" class="flex items-center justify-center rounded-md bg-teal-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-teal-500 text-white transition-all">Run Measured Suite</button>
                    </div>
                </div>
            </div>

            <div class="w-full md:w-1/2 p-4 sm:p-6 lg:p-8 flex flex-col overflow-y-auto bg-gray-50">
                <div class="flex-1 flex flex-col rounded-lg min-h-0 relative bg-white border border-gray-200 shadow-sm">
                    <div id="loader" class="absolute inset-0 z-10 flex items-center justify-center bg-white bg-opacity-75 rounded-lg hidden">
                        <div class="loader h-12 w-12 rounded-full border-4 border-t-4 border-gray-200"></div>
                    </div>
                    
                    <div id="back-button-container" class="hidden p-4 border-b border-gray-200">
                        <button onclick="renderSuiteSummary(currentSuiteData, currentSuiteTitle)" class="text-sm font-medium text-blue-600 hover:text-blue-500">&larr; Back to Suite Summary</button>
                    </div>

                    <nav class="flex border-b border-gray-200" id="tab-nav"></nav>

                    <div class="flex-1 overflow-y-auto" id="tab-content">
                        <div id="welcome-message" class="p-4 text-gray-500 block">Enter QASM code on the left and click a button to run a comparison.</div>
                        
                        <div id="summary-panel" class="p-4 hidden"></div>
                        <div id="performance-panel" class="p-4 hidden"></div>
                        <div id="resources-panel" class="p-4 hidden"></div>
                        <div id="divergence-panel" class="p-4 hidden"></div>
                        <div id="suite-summary-panel" class="p-4 hidden"></div>
                        
                        <div id="raw-panel" class="p-0 hidden relative">
                             <button id="copy-btn" onclick="copyRawJson(this)" class="absolute top-2 right-2 bg-gray-200 hover:bg-gray-300 text-gray-700 text-xs font-medium py-1 px-3 rounded-md transition-all z-10">Copy</button>
                             <pre id="json-output" class="h-full w-full p-4 overflow-auto text-xs text-gray-700 whitespace-pre-wrap break-words bg-gray-50 rounded-b-lg"></pre>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- INIT ---
        
        // --- GLOBAL STATE ---
        let currentSuiteData = null;
        let currentSuiteTitle = '';
        
        // --- DOM ELEMENTS ---
        const qasmInput = document.getElementById('qasm-input');
        const shotsInput = document.getElementById('shots');
        const loader = document.getElementById('loader');
        const tabNav = document.getElementById('tab-nav');
        const welcomeMessage = document.getElementById('welcome-message');
        const backButtonContainer = document.getElementById('back-button-container');
        const jsonOutput = document.getElementById('json-output');

        const panelElements = {
            'summary': document.getElementById('summary-panel'),
            'performance': document.getElementById('performance-panel'),
            'resources': document.getElementById('resources-panel'),
            'divergence': document.getElementById('divergence-panel'),
            'raw': document.getElementById('raw-panel'),
            'suite-summary': document.getElementById('suite-summary-panel')
        };

        const allButtons = [
            document.getElementById('btn-statevector'),
            document.getElementById('btn-measured'),
            document.getElementById('btn-bench-statevector'),
            document.getElementById('btn-bench-measured')
        ];

        // --- CORE FUNCTIONS ---

        function setLoading(isLoading) {
            if (isLoading) {
                loader.classList.remove('hidden');
                loader.classList.add('flex');
                allButtons.forEach(btn => btn.disabled = true);
            } else {
                loader.classList.add('hidden');
                loader.classList.remove('flex');
                allButtons.forEach(btn => btn.disabled = false);
            }
        }

        function clearReport() {
            welcomeMessage.classList.add('hidden');
            tabNav.innerHTML = '';
            backButtonContainer.classList.add('hidden');
            
            Object.entries(panelElements).forEach(([key, panel]) => {
                if (key !== 'raw') {
                    panel.innerHTML = '';
                }
                panel.classList.add('hidden');
            });
            
            jsonOutput.textContent = '';
        }

        function showTab(tabName) {
            welcomeMessage.classList.add('hidden');
            
            Object.values(panelElements).forEach(panel => panel.classList.add('hidden'));
            
            const panel = panelElements[tabName];
            if (panel) panel.classList.remove('hidden');

            // Update Buttons
            tabNav.querySelectorAll('button').forEach(btn => {
                btn.classList.remove('border-blue-600', 'text-blue-600');
                btn.classList.add('border-transparent', 'text-gray-500', 'hover:text-gray-700');
            });
            const activeBtn = tabNav.querySelector(`[data-tab="${tabName}"]`);
            if (activeBtn) {
                activeBtn.classList.add('border-blue-600', 'text-blue-600');
                activeBtn.classList.remove('border-transparent', 'text-gray-500', 'hover:text-gray-700');
            }
        }

        function renderTabs(tabList) {
            tabNav.innerHTML = '';
            tabList.forEach(tabName => {
                const button = document.createElement('button');
                button.className = 'ml-4 px-3 py-3 font-medium text-sm border-b-2 border-transparent text-gray-500 hover:text-gray-700';
                button.textContent = tabName.replace('-', ' ').replace(/\b\w/g, l => l.toUpperCase());
                if (tabName === 'raw') button.textContent = "Raw JSON";
                button.dataset.tab = tabName;
                button.onclick = () => showTab(tabName);
                tabNav.appendChild(button);
            });
        }

        // --- API CALLS ---

        async function runComparison(type) {
            const qasm = qasmInput.value.trim();
            if (!qasm) { alert("Please enter QASM code."); return; }

            const endpoint = type === 'statevector' ? '/compare' : '/compare_measured';
            const payload = type === 'statevector' ? { qasm_string: qasm } : { qasm_string: qasm, n_shots: parseInt(shotsInput.value) || 1024 };
            const title = type === 'statevector' ? 'Statevector Report' : 'Measurement Report';

            setLoading(true);
            clearReport();

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) {
                    const errorText = await res.text();
                    throw new Error(`HTTP error! Status: ${res.status} ${res.statusText}. Details: ${errorText}`);
                }

                const data = await res.json();
                renderDetailReport(data, title);
            } catch (e) {
                console.error(e);
                renderDetailReport({ error: e.message }, "Error");
            } finally {
                setLoading(false);
            }
        }

        async function runBenchmark(type) {
            const endpoint = type === 'statevector' ? '/run_benchmark_suite' : '/run_measured_benchmark_suite';
            const payload = type === 'statevector' ? {} : { n_shots: parseInt(shotsInput.value) || 1024 };
            const title = type === 'statevector' ? 'Statevector Suite' : 'Measured Suite';

            setLoading(true);
            clearReport();

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) {
                    const errorText = await res.text();
                    throw new Error(`HTTP error! Status: ${res.status} ${res.statusText}. Details: ${errorText}`);
                }
                
                const data = await res.json();
                
                currentSuiteData = data;
                currentSuiteTitle = title;
                
                renderSuiteSummary(data, title);
            } catch (e) {
                console.error(e);
                renderSuiteSummary({ error: e.message }, title);
            } finally {
                setLoading(false);
            }
        }

        // --- RENDERERS ---

        function renderDetailReport(data, title) {
            renderTabs(['summary', 'performance', 'resources', 'divergence', 'raw']);
            
            // Populate Raw Tab
            jsonOutput.textContent = JSON.stringify(data, null, 2);

            // Populate Summary Tab
            renderSummaryPanel(data, title);

            if (!data.error) {
                if (data.performance_report) renderRankingTable(data.performance_report, 'execution_time_sec', 's', panelElements.performance);
                if (data.resource_report) renderRankingTable(data.resource_report, 'memory_usage_mb', 'MiB', panelElements.resources);
                if (data.divergence_report) renderDivergenceTables(data.divergence_report, panelElements.divergence);
            }

            showTab('summary');
        }

        function renderSuiteSummary(data, title) {
            clearReport();
            renderTabs(['suite-summary', 'raw']);
            jsonOutput.textContent = JSON.stringify(data, null, 2);

            let html = `<h2 class="text-xl font-semibold text-gray-900 mb-4">${title}</h2>`;
            
            if (data.error) {
                html += `<div class="p-4 bg-red-50 text-red-700 rounded border border-red-200">API Error: ${data.error}</div>`;
            } else {
                const summary = data.benchmark_summary || [];
                const errors = summary.filter(r => r.error).length;
                html += `<div class="mb-4 p-4 bg-white border rounded shadow-sm">Processed <b>${summary.length}</b> files with <b>${errors}</b> errors.</div>`;
                
                html += `<div class="overflow-x-auto border rounded-lg"><table class="min-w-full divide-y divide-gray-200"><thead class="bg-gray-50"><tr>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">File</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Fastest</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Lightest</th>
                    <th></th>
                </tr></thead><tbody class="bg-white divide-y divide-gray-200">`;

                summary.forEach((item, idx) => {
                    const fname = item.benchmark_file ? item.benchmark_file.replace('benchmarks/', '') : 'Unknown';
                    let status = `<span class="px-2 py-1 text-xs rounded bg-green-100 text-green-800">Success</span>`;
                    if (item.error) status = `<span class="px-2 py-1 text-xs rounded bg-red-100 text-red-800">Error</span>`;
                    else if (item.divergence_report && item.divergence_report.divergences_found.length > 0) status = `<span class="px-2 py-1 text-xs rounded bg-yellow-100 text-yellow-800">Divergence</span>`;

                    const fast = item.performance_report?.ranking[0]?.simulator || '-';
                    const light = item.resource_report?.ranking[0]?.simulator || '-';

                    html += `<tr>
                        <td class="px-4 py-3 text-sm font-medium text-gray-900">${fname}</td>
                        <td class="px-4 py-3">${status}</td>
                        <td class="px-4 py-3 text-sm text-gray-500">${fast}</td>
                        <td class="px-4 py-3 text-sm text-gray-500">${light}</td>
                        <td class="px-4 py-3 text-right"><button onclick="viewDetail(${idx})" class="text-blue-600 hover:text-blue-900 text-sm font-medium">Details</button></td>
                    </tr>`;
                });
                html += `</tbody></table></div>`;
            }
            
            panelElements['suite-summary'].innerHTML = html;
            showTab('suite-summary');
        }

        function viewDetail(index) {
            const item = currentSuiteData.benchmark_summary[index];
            const fname = item.benchmark_file ? item.benchmark_file.replace('benchmarks/', '') : 'Unknown';
            
            clearReport();
            backButtonContainer.classList.remove('hidden');
            renderDetailReport(item, `Detail: ${fname}`);
        }

        // --- PANEL RENDERERS ---

        function renderSummaryPanel(data, title) {
            let html = `<h2 class="text-xl font-semibold text-gray-900 mb-4">${title}</h2>`;
            
            if (data.error) {
                html += `<div class="p-4 bg-red-50 text-red-700 border border-red-200 rounded"><h3 class="font-bold">API Error</h3><pre class="mt-2 text-xs">${data.error}</pre></div>`;
            } else {
                const errors = data.raw_results ? data.raw_results.filter(r => r.error) : [];
                const divergences = data.divergence_report ? data.divergence_report.divergences_found : [];

                if (errors.length > 0) {
                    html += `<div class="p-4 bg-red-50 text-red-700 border border-red-200 rounded"><h3 class="font-bold">Runner Errors (${errors.length})</h3><ul class="list-disc ml-5 mt-2 text-sm">${errors.map(e => `<li><b>${e.simulator}</b>: ${e.error}</li>`).join('')}</ul></div>`;
                } else if (divergences.length > 0) {
                    html += `<div class="p-4 bg-yellow-50 text-yellow-800 border border-yellow-200 rounded"><h3 class="font-bold">Divergences Found (${divergences.length})</h3><ul class="list-disc ml-5 mt-2 text-sm">${divergences.map(d => `<li>${d.type} between ${d.simulators.join(' & ')}</li>`).join('')}</ul></div>`;
                } else {
                    const msg = data.n_shots ? "All measurement distributions are statistically identical." : "All statevectors are identical (1.0 Fidelity).";
                    html += `<div class="p-4 bg-green-50 text-green-800 border border-green-200 rounded flex items-center"><svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>${msg}</div>`;
                }
            }
            panelElements.summary.innerHTML = html;
        }

        function renderRankingTable(report, key, unit, panel) {
            let html = `<h3 class="font-semibold text-gray-900 mt-4 mb-2">${report.summary}</h3>`;
            html += `<div class="overflow-x-auto border rounded-lg"><table class="min-w-full divide-y divide-gray-200"><thead class="bg-gray-50"><tr><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Rank</th><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Simulator</th><th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Value</th></tr></thead><tbody class="bg-white divide-y divide-gray-200">`;
            
            report.ranking.forEach((r, i) => {
                const val = r.status === 'success' && r[key] !== null ? `${r[key].toFixed(6)} ${unit}` : `<span class="text-red-600">Error</span>`;
                html += `<tr><td class="px-4 py-3 text-sm text-gray-500">${i+1}</td><td class="px-4 py-3 text-sm font-medium text-gray-900">${r.simulator}</td><td class="px-4 py-3 text-sm text-gray-500 font-mono">${val}</td></tr>`;
            });
            html += `</tbody></table></div>`;
            panel.innerHTML = html;
        }

        function renderDivergenceTables(report, panel) {
            let html = `<div class="space-y-8">`;
            let found = false;

            // Helper to render one matrix
            const renderMat = (key, title) => {
                if (!report[key]) return;
                found = true;
                html += `<div><h3 class="font-semibold text-gray-900 mt-4 mb-2">${title}</h3><div class="overflow-x-auto"><table class="matrix-table border-collapse border border-gray-300"><thead class="bg-gray-50"><tr><th class="border p-2"></th>${report.simulators.map(s => `<th class="sim-header border p-2 text-xs text-gray-500">${s}</th>`).join('')}</tr></thead><tbody>`;
                
                report.simulators.forEach((s1, i) => {
                    html += `<tr><th class="border p-2 text-xs text-left text-gray-500">${s1}</th>`;
                    report[key][i].forEach((val, j) => {
                        let bg = 'bg-white';
                        let txt = val.toFixed(4);
                        if (val === 1.0) { txt = "1.000"; bg = key.includes('fidelity') ? 'bg-green-50' : 'bg-white'; }
                        else if (val === 0.0) { txt = "0.000"; }
                        else if (val === -1.0) { txt = "ERR"; bg = 'bg-red-50'; }
                        else { bg = 'bg-yellow-50'; } // Divergence!
                        if (i===j) bg = 'bg-gray-100';
                        html += `<td class="border p-2 text-xs text-center font-mono ${bg}">${txt}</td>`;
                    });
                    html += `</tr>`;
                });
                html += `</tbody></table></div></div>`;
            };

            renderMat('fidelity_matrix', 'Fidelity Matrix');
            renderMat('relative_phase_matrix', 'Relative Phase Matrix');
            renderMat('statistical_distance_matrix (js_divergence)', 'JS Divergence Matrix');

            if (!found) html += `<p class="text-gray-500 mt-4">No matrices available.</p>`;
            html += `</div>`;
            panel.innerHTML = html;
        }

        function copyRawJson(btn) {
            const txt = jsonOutput.textContent;
            navigator.clipboard.writeText(txt).then(() => {
                const old = btn.textContent;
                btn.textContent = "Copied!";
                setTimeout(() => btn.textContent = old, 2000);
            }).catch(err => console.error(err));
        }
    </script>
</body>
</html>
