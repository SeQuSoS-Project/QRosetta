services:
  # Service 1: The main user-facing API
  api:
    build:
      context: .
      dockerfile: ./rosetta-api/Dockerfile
    container_name: rosetta-api
    ports:
      - "8000:8000"
    # --- FIX ---
    # We mount the whole directory so it can access
    # comparator.py, benchmarks/, and main.py
    volumes:
      - ./rosetta-api:/app
    # --- END FIX ---
    depends_on:
      - qiskit_runner
      - cirq_runner
      - qulacs_runner
      - braket_runner
      - projectq_runner
      - quest_runner # <-- Changed back

  # Our 6 runners
  qiskit_runner:
    build:
      context: .
      dockerfile: ./qiskit-runner/Dockerfile
    container_name: qiskit-runner
    ports:
      - "8001:8000"
    # --- FIX ---
    # Mount only the main.py file, not the whole folder.
    volumes:
      - ./qiskit-runner/main.py:/app/main.py
    # --- END FIX ---

  cirq_runner:
    build:
      context: .
      dockerfile: ./cirq-runner/Dockerfile
    container_name: cirq-runner
    ports:
      - "8002:8000"
    # --- FIX ---
    volumes:
      - ./cirq-runner/main.py:/app/main.py
    # --- END FIX ---

  qulacs_runner:
    build:
      context: .
      dockerfile: ./qulacs-runner/Dockerfile
    container_name: qulacs-runner
    ports:
      - "8003:8000"
    # --- FIX ---
    volumes:
      - ./qulacs-runner/main.py:/app/main.py
    # --- END FIX ---

  braket_runner:
    build:
      context: .
      dockerfile: ./braket-runner/Dockerfile
    container_name: braket-runner
    ports:
      - "8004:8000"
    # --- FIX ---
    volumes:
      - ./braket-runner/main.py:/app/main.py
    # --- END FIX ---
  
  projectq_runner:
    build:
      context: .
      dockerfile: ./projectq-runner/Dockerfile
    container_name: projectq-runner
    ports:
      - "8005:8000"
    # --- FIX ---
    volumes:
      - ./projectq-runner/main.py:/app/main.py
    # --- END FIX ---

  # --- THIS SERVICE IS CHANGED BACK ---
  quest_runner:
    build:
      context: .
      dockerfile: ./quest-runner/Dockerfile
    container_name: quest-runner
    ports:
      - "8006:8000"
    # --- FIX ---
    volumes:
      - ./quest-runner/main.py:/app/main.py
    # --- END FIX ---