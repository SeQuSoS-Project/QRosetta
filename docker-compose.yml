services:
  # Service 1: The main user-facing API
  api:
    build:
      context: ./rosetta-api
      dockerfile: Dockerfile
    container_name: rosetta-api
    ports:
      - "8000:8000"
    volumes:
      - ./rosetta-api:/app
    depends_on:
      - qiskit_runner
      - cirq_runner
      - qulacs_runner
      - braket_runner
      - projectq_runner
      - quest_runner     # <-- ADDED THIS

  # Our 5 existing runners
  qiskit_runner:
    build:
      context: ./qiskit-runner
      dockerfile: Dockerfile
    container_name: qiskit-runner
    ports:
      - "8001:8000"
    volumes:
      - ./qiskit-runner:/app

  cirq_runner:
    build:
      context: ./cirq-runner
      dockerfile: Dockerfile
    container_name: cirq-runner
    ports:
      - "8002:8000"
    volumes:
      - ./cirq-runner:/app

  qulacs_runner:
    build:
      context: ./qulacs-runner
      dockerfile: Dockerfile
    container_name: qulacs-runner
    ports:
      - "8003:8000"
    volumes:
      - ./qulacs-runner:/app

  braket_runner:
    build:
      context: ./braket-runner
      dockerfile: Dockerfile
    container_name: braket-runner
    ports:
      - "8004:8000"
    volumes:
      - ./braket-runner:/app
  
  projectq_runner:
    build:
      context: ./projectq-runner
      dockerfile: Dockerfile
    container_name: projectq-runner
    ports:
      - "8005:8000"
    volumes:
      - ./projectq-runner:/app

  # Service 7: The isolated QuEST runner
  quest_runner:
    build:
      context: ./quest-runner   # <-- NEW SERVICE
      dockerfile: Dockerfile
    container_name: quest-runner
    ports:
      - "8006:8000"             # <-- Use a new host port (8006)
    volumes:
      - ./quest-runner:/app