services:
  # --- Service 1: Nginx ( The Bridge ) ---
  nginx:
    build:
      context: .
      dockerfile: ./nginx/Dockerfile
    container_name: nginx-reverse-proxy
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - public_net
      - isolated_net
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "128M"

  # --- Service 2: The API ( The Brain ) ---
  api:
    build:
      context: .
      dockerfile: ./rosetta-api/Dockerfile
    container_name: rosetta-api
    environment:
      - RUNNER_TIMEOUT_SEC=${RUNNER_TIMEOUT_SEC:-60}
    volumes:
      - rosetta_db_data:/home/appuser/app/data
    networks:
      - isolated_net
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/algorithms')" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"

  # --- Services 3-10: The Runners ( The Hands ) ---

  pytket_qiskit_runner:
    build:
      context: .
      dockerfile: ./runners/pytket-qiskit-runner/Dockerfile
    container_name: pytket-qiskit-runner
    networks:
      - isolated_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"

  pytket_cirq_runner:
