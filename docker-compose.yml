services:
  # --- Service 1: Nginx Reverse Proxy ---
  nginx:
    build:
      context: .
      dockerfile: ./nginx/Dockerfile
    container_name: nginx-reverse-proxy
    ports:
      - "80:80" # The only port exposed to the public
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "128M"

  # --- Service 2: The Main API (The "Brain") ---
  api:
    build:
      context: .
      dockerfile: ./rosetta-api/Dockerfile
    container_name: rosetta-api
    environment:
      - RUNNER_TIMEOUT_SEC=60
    # --- PRODUCTION CONFIG: VOLUMES DISABLED ---
    # We comment these out so the container uses the secure, 
    # immutable code inside the image, not your local files.
    # volumes:
    #   - ./rosetta-api:/home/appuser/app
    #   - ./shared:/home/appuser/shared
    # -------------------------------------------
    depends_on:
      - qiskit_runner
      - cirq_runner
      - qulacs_runner
      - braket_runner
      - projectq_runner
      - quest_runner
      - pennylane_runner
      - pennylane_default_runner
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"

  # --- Services 3-10: The Simulator Runners (The "Hands") ---

  qiskit_runner:
    build:
      context: .
      dockerfile: ./pytket-qiskit-runner/Dockerfile
    container_name: pytket-qiskit-runner
    ports:
      - "8001:8000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"

  cirq_runner:
    build:
      context: .
      dockerfile: ./pytket-cirq-runner/Dockerfile
    container_name: pytket-cirq-runner
    ports:
      - "8002:8000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"

  qulacs_runner:
    build:
      context: .
      dockerfile: ./pytket-qulacs-runner/Dockerfile
    container_name: pytket-qulacs-runner
    ports:
      - "8003:8000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"

  braket_runner:
    build:
      context: .
      dockerfile: ./pytket-braket-runner/Dockerfile
    container_name: pytket-braket-runner
    ports:
      - "8004:8000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"
  
  projectq_runner:
    build:
      context: .
      dockerfile: ./pytket-projectq-runner/Dockerfile
    container_name: pytket-projectq-runner
    ports:
      - "8005:8000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"

  quest_runner:
    build:
      context: .
      dockerfile: ./pytket-quest-runner/Dockerfile
    container_name: pytket-quest-runner
    ports:
      - "8006:8000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"

  pennylane_runner:
      build:
        context: .
        dockerfile: ./pennylane-lightning-runner/Dockerfile
      container_name: pennylane-lightning-runner
      ports:
        - "8007:8000"
      deploy:
        resources:
          limits:
            cpus: "0.5"
            memory: "512M"

  pennylane_default_runner:
      build:
        context: .
        dockerfile: ./pennylane-default-runner/Dockerfile
      container_name: pennylane-default-runner
      ports:
        - "8008:8000"
      deploy:
        resources:
          limits:
            cpus: "0.5"
            memory: "512M"