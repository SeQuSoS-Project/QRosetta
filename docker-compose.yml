services:
  # Service 1: The main user-facing API
  api:
    build:
      context: .
      dockerfile: ./rosetta-api/Dockerfile
    container_name: rosetta-api
    ports:
      - "8000:8000"
    environment:
      - RUNNER_TIMEOUT_SEC=60
    # --- FIX ---
    # We mount the whole directory so it can access
    # comparator.py, benchmarks/, and main.py
    # volumes:
    #   - ./rosetta-api:/app
    # --- END FIX ---
    depends_on:
      - qiskit_runner
      - cirq_runner
      - qulacs_runner
      - braket_runner
      - projectq_runner
      - quest_runner
      - pennylane_runner
      - pennylane_default_runner
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"

  # Our 6 runners
  qiskit_runner:
    build:
      context: .
      dockerfile: ./pytket-qiskit-runner/Dockerfile
    container_name: pytket-qiskit-runner
    ports:
      - "8001:8000"
    # --- FIX ---
    # Mount only the main.py file, not the whole folder.
    # volumes:
    #   - ./pytket-qiskit-runner/main.py:/app/main.py
    # --- END FIX ---
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"

  cirq_runner:
    build:
      context: .
      dockerfile: ./pytket-cirq-runner/Dockerfile
    container_name: pytket-cirq-runner
    ports:
      - "8002:8000"
    # --- FIX ---
    # volumes:
    #   - ./pytket-cirq-runner/main.py:/app/main.py
    # --- END FIX ---
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"

  qulacs_runner:
    build:
      context: .
      dockerfile: ./pytket-qulacs-runner/Dockerfile
    container_name: pytket-qulacs-runner
    ports:
      - "8003:8000"
    # --- FIX ---
    # volumes:
    #   - ./pytket-qulacs-runner/main.py:/app/main.py
    # --- END FIX ---
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"

  braket_runner:
    build:
      context: .
      dockerfile: ./pytket-braket-runner/Dockerfile
    container_name: pytket-braket-runner
    ports:
      - "8004:8000"
    # --- FIX ---
    # volumes:
    #   - ./pytket-braket-runner/main.py:/app/main.py
    # --- END FIX ---
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"
  
  projectq_runner:
    build:
      context: .
      dockerfile: ./pytket-projectq-runner/Dockerfile
    container_name: pytket-projectq-runner
    ports:
