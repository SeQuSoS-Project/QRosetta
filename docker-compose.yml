services:
  # --- Service 1: Nginx ( The Bridge ) ---
  nginx:
    build:
      context: .
      dockerfile: ./nginx/Dockerfile
    container_name: nginx-reverse-proxy
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - public_net
      - isolated_net
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "128M"

  # --- Service 2: The API ( The Brain ) ---
  api:
    build:
      context: .
      dockerfile: ./rosetta-api/Dockerfile
    container_name: rosetta-api
    environment:
      - RUNNER_TIMEOUT_SEC=${RUNNER_TIMEOUT_SEC:-60}
    networks:
      - isolated_net
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/algorithms')" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"

  # --- Services 3-10: The Runners ( The Hands ) ---

  qiskit_runner:
    build:
      context: .
      dockerfile: ./pytket-qiskit-runner/Dockerfile
    container_name: pytket-qiskit-runner
    networks:
      - isolated_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"

  cirq_runner:
    build:
      context: .
      dockerfile: ./pytket-cirq-runner/Dockerfile
    container_name: pytket-cirq-runner
    networks:
      - isolated_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"

  qulacs_runner:
    build:
      context: .
      dockerfile: ./pytket-qulacs-runner/Dockerfile
    container_name: pytket-qulacs-runner
    networks:
      - isolated_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"

  braket_runner:
    build:
      context: .
      dockerfile: ./pytket-braket-runner/Dockerfile
    container_name: pytket-braket-runner
    networks:
      - isolated_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"

  projectq_runner:
    build:
      context: .
      dockerfile: ./pytket-projectq-runner/Dockerfile
    container_name: pytket-projectq-runner
    networks:
      - isolated_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"

  quest_runner:
    build:
      context: .
      dockerfile: ./pytket-quest-runner/Dockerfile
    container_name: pytket-quest-runner
    networks:
      - isolated_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"

  pennylane_runner:
    build:
      context: .
      dockerfile: ./pennylane-lightning-runner/Dockerfile
    container_name: pennylane-lightning-runner
    networks:
      - isolated_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"

  pennylane_default_runner:
    build:
      context: .
      dockerfile: ./pennylane-default-runner/Dockerfile
    container_name: pennylane-default-runner
    networks:
      - isolated_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"

# --- NETWORK DEFINITIONS ---
networks:
  public_net:
    driver: bridge
  isolated_net:
    internal: true
